repos:
  - repo: local
    hooks:
      - id: comment-style-checker
        name: Check Comment Placement
        entry: python precommit/check_comments.py
        language: python
        files: \.py$
        always_run: true
        pass_filenames: true

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        args: [--skip-magic-trailing-comma]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes]
